 

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacaqu Café Rewards</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <img src="./logo.png" alt="Jacaqu Café Logo" class="logo">
            <h1 class="brand-name">Café Rewards</h1>
            <p>Jacaqu Café - Programa de Fidelidad</p>
        </header>

        <section id="view-register" class="card">
            <h2>Gestión de Cliente</h2>
            <form id="form-registro">
                <input type="text" id="nombre" placeholder="Nombre" required>
                <input type="text" id="apellido" placeholder="Apellido" required>
                <input type="tel" id="celular" placeholder="Celular" required>
                <input type="email" id="correo" placeholder="Correo Electrónico">
                <input type="date" id="fecha_nacimiento" title="Fecha de Nacimiento" required>

                <div class="button-row">
                    <button type="submit" class="btn-registrar">🆕 Registrar</button>
                    <button type="button" class="btn-buscar" onclick="showView('view-barista')">🔍 Buscar</button>
                </div>
                <button type="reset" class="btn-limpiar">✔️ Siguiente Cliente / Limpiar</button>
            </form>
        </section>

        <section id="view-client" class="points-section">
            <h3>Puntos Acumulados</h3>
            <div class="points-number" id="current-points">0</div>
            <p>¡Faltan 10 cafés para tu premio!</p>
            
            <div id="qrcode" class="qr-placeholder">
                <small>El QR aparecerá aquí al registrar</small>
            </div>
        </section>

        <footer>
            <button class="btn-ghost" onclick="showView('view-barista')">Acceso Staff</button>
        </footer>
    </div>

    <script src="./js/main.js" defer></script>
</body>
</html>
