 

   <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaqaku Café | PROYECTO ANTONIO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>

    <main class="container">
        <header class="main-header">
            <div class="logo-container">
                <img src="logo.png" alt="Jaqaku Logo" class="main-logo">
            </div>
            <h1 class="brand-title">Café Rewards</h1>
            <p class="brand-subtitle">Programa de Lealtad</p>
        </header>

        <section class="form-section">
            <form id="form-cliente">
                <input type="text" id="nombre" placeholder="Nombre" required>
                <input type="text" id="apellido" placeholder="Apellido" required>
                <input type="tel" id="celular" placeholder="Celular (WhatsApp)">
                <input type="email" id="correo" placeholder="Correo Electrónico">
                
                <div class="button-group">
                    <button type="submit" class="btn-nuevo">🆕 Registrar</button>
                    <button type="button" onclick="buscarCliente()" class="btn-buscar">🔍 Buscar Manual</button>
                </div>
                <button type="button" onclick="activarEscaner()" class="btn-buscar" style="background-color: #2e7d32; margin-bottom: 10px;">📷 Escanear QR</button>
                <button type="button" onclick="limpiarPantalla()" class="btn-limpiar">🧹 Siguiente / Limpiar</button>
            </form>
        </section>

        <div id="reader-container" style="display: none; margin-top: 20px;">
            <div id="reader"></div>
            <button onclick="detenerEscaner()" class="btn-limpiar">❌ Cerrar Cámara</button>
        </div>

        <div id="lista-clientes-container"></div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
